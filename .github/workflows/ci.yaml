name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Unit tests (no Redis required) ──
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-may-redis-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests
        run: cargo test --features test --lib -- --test-threads=1

      - name: Clippy
        run: cargo clippy --lib --tests --all-features -- -D warnings

      - name: Format check
        run: cargo fmt --all --check

  # ── Integration tests (require Redis) ──
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-may-redis-${{ hashFiles('**/Cargo.lock') }}

      - name: Wait for Redis
        run: |
          for i in $(seq 1 10); do
            redis-cli -h localhost ping && break
            sleep 1
          done

      - name: Run integration tests
        run: cargo test --features test --lib -- --test-threads=1

  # ── Doc tests ──
  doc-tests:
    name: Doc Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-may-redis-${{ hashFiles('**/Cargo.lock') }}

      - name: Run doc tests
        run: cargo test --doc
