name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Unit tests (no Redis required) ──
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-may-redis-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-may-redis-

      # NOTE: Skip integration tests here — they require a live Redis
      # and are exercised by the `integration-tests` job below. Every
      # Redis-touching test in the lib follows the `test_integration_*`
      # naming convention (see `src/client/client.rs`), so a single
      # `--skip` clause is sufficient and self-maintaining.
      - name: Run unit tests (no Redis)
        run: cargo test --features test --lib -- --test-threads=1 --skip test_integration_

      - name: Clippy
        run: cargo clippy --lib --tests --all-features -- -D warnings

      - name: Format check
        run: cargo fmt --all --check

  # ── Integration tests (require Redis) ──
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-may-redis-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-may-redis-

      - name: Wait for Redis
        run: |
          for i in $(seq 1 10); do
            redis-cli -h localhost ping && break
            sleep 1
          done

      # Run ONLY the test_integration_* family. They share Redis state
      # and FLUSHDB between assertions, so --test-threads=1 is mandatory.
      - name: Run integration tests
        run: cargo test --features test --lib test_integration_ -- --test-threads=1

  # ── Doc tests ──
  doc-tests:
    name: Doc Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-may-redis-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-may-redis-

      - name: Run doc tests
        run: cargo test --doc
